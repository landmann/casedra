<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clippath id="halfClip">
      <rect x="0" y="0" width="300" height="200"/>

    </clippath>
  </defs>
  <g clip-path="url(#halfClip)">
    <circle cx="100" cy="100" r="80" fill="#0F2D50"/>
    <circle cx="100" cy="100" r="40" fill="white"/>
    <circle cx="100" cy="100" r="35" fill="#D9B88E"/>
  </g>
  <!-- Vertical lines extending downward from the semicircles -->
  <line x1="40" y1="100" x2="40" y2="200" stroke="#0F2D50" stroke-width="40"/>
  <line x1="62.5" y1="100" x2="62.5" y2="400" stroke="#FFFFFF" stroke-width="5"/>
  <line x1="160" y1="100" x2="160" y2="200" stroke="#0F2D50" stroke-width="40"/>
  <line x1="137.5" y1="100" x2="137.5" y2="400" stroke="#FFFFFF" stroke-width="5"/>
  <line x1="100" y1="100" x2="100" y2="200" stroke="#D9B88E" stroke-width="70"/>
</svg>
